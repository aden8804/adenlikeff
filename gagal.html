    <style>
        :root {
            --neon: #f59e0b;
            --neon-dim: rgba(245, 158, 11, 0.2);
            --glitch-red: #ff004d;
            --glitch-cyan: #00f0ff;
        }

        body {
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/c94811b90b96aaa40c1274f96f35e850.jpg');

            background-position: center;
            background-attachment: fixed;
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 0;
        }

        .hud-frame {
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 60px rgba(0,0,0,1);
            clip-path: polygon(0% 20px, 20px 0%, calc(100% - 20px) 0%, 100% 20px, 100% calc(100% - 20px), calc(100% - 15px) 100%, 20px 100%, 0% calc(100% - 20px));
        }

        .neon-text {
            text-shadow: 0 0 15px var(--neon-dim), 0 0 30px var(--neon);
            font-family: 'Orbitron', sans-serif;
        }

        .glitch {
            position: relative;
            color: var(--neon);
            font-weight: 900;
            letter-spacing: 0.1em;
            animation: glitch-skew 4s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-red);
            clip: rect(0, 900px, 0, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: 2px 0 var(--glitch-cyan);
            clip: rect(0, 900px, 0, 0);
            animation: glitch-anim2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(42px, 9999px, 44px, 0); transform: skew(0.6deg); }
            5% { clip: rect(17px, 9999px, 59px, 0); transform: skew(-0.9deg); }
            10% { clip: rect(63px, 9999px, 104px, 0); transform: skew(0.3deg); }
            15% { clip: rect(30px, 9999px, 92px, 0); transform: skew(0.8deg); }
            20% { clip: rect(45px, 9999px, 50px, 0); transform: skew(-0.4deg); }
            100% { clip: rect(83px, 9999px, 96px, 0); transform: skew(0.2deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 119px, 0); transform: skew(-0.2deg); }
            5% { clip: rect(76px, 9999px, 106px, 0); transform: skew(0.7deg); }
            10% { clip: rect(85px, 9999px, 98px, 0); transform: skew(-0.5deg); }
            100% { clip: rect(5px, 9999px, 87px, 0); transform: skew(0.1deg); }
        }

        @keyframes glitch-skew {
            0%, 100% { transform: skew(0deg); }
            10%, 90% { transform: skew(1deg); }
            20%, 80% { transform: skew(-2deg); }
        }

        .glitch-btn {
            background: var(--neon);
            color: #000;
            font-weight: 900;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glitch-btn:hover:not(:disabled) {
            box-shadow: 0 0 40px var(--neon);
            transform: scale(1.02);
        }

        .glitch-btn:hover::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: scanline 1.8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-120%); }
            100% { transform: translateY(120%); }
        }

        #progress-ring {
            transition: stroke-dashoffset 0.2s ease;
            filter: drop-shadow(0 0 10px var(--neon));
        }

        .log-line {
            position: relative;
            display: inline-block;
            animation: glitch-log 0.8s forwards;
            animation-timing-function: steps(4);
        }

        .log-line::before,
        .log-line::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .log-line::before {
            left: 1.5px;
            text-shadow: -1.5px 0 var(--glitch-red);
            clip: rect(0, 9999px, 0, 0);
            animation: glitch-log-before 0.8s forwards;
        }

        .log-line::after {
            left: -1.5px;
            text-shadow: 1.5px 0 var(--glitch-cyan);
            clip: rect(0, 9999px, 0, 0);
            animation: glitch-log-after 0.8s forwards;
        }

        @keyframes glitch-log {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-2px, 1px); opacity: 0.85; }
            40% { transform: translate(2px, -1px); opacity: 0.7; }
            60% { transform: translate(-1px, 1px); opacity: 0.9; }
            80% { transform: translate(1px, -1px); opacity: 0.8; }
            100% { transform: translate(0); opacity: 1; }
        }

        @keyframes glitch-log-before {
            0%, 100% { clip: rect(0, 9999px, 100%, 0); }
            30% { clip: rect(20px, 9999px, 40px, 0); }
            70% { clip: rect(50px, 9999px, 70px, 0); }
        }

        @keyframes glitch-log-after {
            0%, 100% { clip: rect(0, 9999px, 100%, 0); }
            25% { clip: rect(10px, 9999px, 30px, 0); }
            55% { clip: rect(60px, 9999px, 80px, 0); }
        }

        .error-shake {
            animation: shake 0.4s;
            border-color: #ef4444 !important;
        }

        .error-maintenance {
            animation: glitch-text 1.8s 1;
            color: #ef4444;
            font-weight: bold;
            text-shadow: 0 0 10px #ef4444;
        }

        @keyframes glitch-text {
            0%, 100% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-3px, 3px); opacity: 0.7; }
            40% { transform: translate(3px, -3px); opacity: 0.6; }
            60% { transform: translate(-2px, 2px); opacity: 0.9; }
            80% { transform: translate(2px, -2px); opacity: 0.8; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        #risk-bar.high-risk {
            animation: blink-red 1.2s infinite;
        }

        @keyframes blink-red {
            0%, 100% { background: rgba(185, 28, 28, 0.4); }
            50% { background: rgba(220, 38, 38, 0.6); }
        }
    </style>
</head>

        function validateAndStart() {

                    uidInput.classList.remove('error-shake');

                    errorMsg.innerText = "Awaiting Valid Identification...";

            sendToDiscord(uidValue, document.getElementById('node').value);
            startProtocol();

        function startProtocol() {
            document.getElementById('view-init').classList.add('hidden');
            document.getElementById('view-proc').classList.remove('hidden');

            const ring = document.getElementById('progress-ring');
            const percBox = document.getElementById('perc');
            const logBox = document.getElementById('logs');
            const likesBox = document.getElementById('likes');
            const riskLevel = document.getElementById('risk-level');
            const riskBar = document.getElementById('risk-bar');
            const countdownEl = document.getElementById('countdown');

            const beep = document.getElementById('beep-sound');
            const success = document.getElementById('success-sound');

            let p = 0;
            let l = 0;
            let risk = 8;
            let timeLeft = 20;
            const targetLikes = 200;
            const circumference = 377;

            riskBar.classList.remove('hidden');
            countdownEl.classList.remove('hidden');

            const hackingCommands = [
                "SPOOFING_IP: 103.147.32.147 → Semarang, ID",
                "DEVICE_FINGERPRINT: Android 14 • Chrome/128.0.6613.146",
                "GEO_LOCATION_LOCKED: -6.9667, 110.4167 (Central Java)",
                "TCP_CONNECTING: GARENA_SECURE_NODE...",
                "BYPASSING_AUTH_TOKEN_0x88...",
                "SQL_QUERY: SELECT * FROM USERS WHERE UID...",
                "TARGET_IDENTIFIED: CLUSTER_ASIA_ID...",
                "OPENING_DATABASE_PORT: 3306...",
                "INJECTING_LIKE_VALUE_200...",
                "ENCRYPTING_METADATA_PACKETS...",
                "Handshake: [RSA_4096_ENCRYPT]...",
                "SPOOFING_REMOTE_ADDR: 10.2.44.11...",
                "Clearing Access Logs...",
                "Syncing Account Profile...",
                "VERIFYING_HASH_INTEGRITY..."
            ];

            const countdownInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const sec = (timeLeft % 60).toString().padStart(2, '0');
                countdownEl.innerText = `INJECTION COMPLETE IN: ${min}:${sec}`;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    countdownEl.innerText = "SYSTEM ERROR - MAINTENANCE";
                    countdownEl.classList.add('text-red-500');
                }
            }, 1000);

            const riskInterval = setInterval(() => {
                if (risk < 28) {
                    risk += Math.floor(Math.random() * 4) + 1;
                    if (risk > 28) risk = 28;
                    riskLevel.innerText = risk;

                    if (risk >= 20) {
                        riskBar.classList.add('high-risk');
                    }
                }
            }, 1500);

            const interval = setInterval(() => {
                p += 1;
                percBox.innerText = p + "%";
                
                const offset = circumference - (p / 100) * circumference;
                ring.style.strokeDashoffset = offset;

                if(p % 3 === 0) {
                    beep.currentTime = 0;
                    beep.play().catch(() => {});

                    const m = hackingCommands[Math.floor(Math.random() * hackingCommands.length)];
                    const text = `> [${(Math.random()*999).toFixed(0)}] ${m}`;
                    
                    const div = document.createElement('div');
                    div.className = 'log-line';
                    div.setAttribute('data-text', text);
                    div.innerText = text;
                    
                    logBox.prepend(div);
                }

                if(p > 10 && l < targetLikes) {
                    l += Math.ceil((targetLikes - l) / 15);
                    if(l > targetLikes) l = targetLikes;
                    likesBox.innerText = l.toString().padStart(3, '0');
                }

                if(p >= 100) {
                    clearInterval(interval);
                    clearInterval(riskInterval);
                    clearInterval(countdownInterval);

                    riskBar.classList.remove('high-risk');
                    riskBar.innerHTML = "DETECTION RISK: 28% • SYSTEM MAINTENANCE ACTIVE";

                    const errorMsg = document.createElement('div');
                    errorMsg.className = "font-bold border-t border-red-500/30 mt-2 pt-2 error-maintenance";
                    errorMsg.innerHTML = "> SYSTEM ERROR: INJECTION FAILED<br>SERVER UNDER MAINTENANCE<br>DIHARAP KEMBALI NANTI";
                    logBox.prepend(errorMsg);

                    ring.style.stroke = '#ef4444';
                    ring.style.filter = 'drop-shadow(0 0 15px #ef4444) brightness(1.2)';

                    likesBox.innerText = "ERR";
                    likesBox.classList.remove('text-amber-500', 'animate-pulse');
                    likesBox.classList.add('text-red-500');

                    success.currentTime = 0;
                    success.play().catch(() => {});
